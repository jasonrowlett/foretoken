<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau Web Data Connector</title>
    <script src="https://connectors.tableau.com/libs/tableauwdc-2.3.0.js"></script>
    <script type="text/javascript">
        (function() {
            var myConnector = tableau.makeConnector();
            
            // Define the schema here
            myConnector.getSchema = function(schemaCallback) {
                var cols = [{
                    id: "id",
                    dataType: tableau.dataTypeEnum.string
                }, {
                    id: "value",
                    dataType: tableau.dataTypeEnum.float
                }];

                var tableSchema = {
                    id: "apiData",
                    alias: "API Data",
                    columns: cols
                };

                schemaCallback([tableSchema]);
            };

            // Get the data
            myConnector.getData = function(table, doneCallback) {
                var apiUrl = "https://api.yourdata.com/v1/endpoint"; // Replace with your API endpoint
                fetch(apiUrl)
                    .then(response => response.json())
                    .then(data => {
                        var tableData = [];
                        
                        // Parse the API response data
                        data.forEach(function(item) {
                            tableData.push({
                                "id": item.id,
                                "value": item.value
                            });
                        });

                        table.appendRows(tableData);
                        doneCallback();
                    });
            };

            tableau.registerConnector(myConnector);

            // Event Listener for WDC Button
            document.querySelector("#submitButton").addEventListener("click", function() {
                tableau.connectionName = "My API Data"; // Name of the data source in Tableau
                tableau.submit();
            });
        })();
    </script>
</head>
<body>
    <h1>Tableau Web Data Connector</h1>
    <button id="submitButton">Get Data</button>
</body>
</html>
